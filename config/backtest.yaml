backtest:
  initial_capital: 10000
  position_size: 0.01
  max_positions: 10
  fee_rate: 0.002
  stop_loss_enabled: true
  take_profit_enabled: true
  max_hold_hours: 48
data:
  min_liquidity: 50000
  min_volume: 100000
  min_traders: 50
  lookback_days: 90
  api_endpoint: https://clob.polymarket.com
  history_interval: 1h
  request_interval_seconds: 0.25
  max_retries: 4
  retry_backoff_seconds: 0.8
  cache_dir: backtest_data_cache
  use_simulated_history: false
  target_categories:
  - politics
  - finance
  - financial
  - economics
  - business
  max_markets: 50
strategy:
  price_spike_threshold: 0.05
  volume_surge_threshold: 2.0
  lookback_periods: 20
  mean_reversion_threshold: 0.02
  min_zscore: 2.2
  min_confidence: 60
  cooldown_bars: 6
  momentum_lookback: 5
  momentum_threshold: 0.02
reporting:
  output_dir: backtest_results
  save_json: true
  save_html: true
  generate_charts: true
date_range:
  start_date: null
  end_date: null
